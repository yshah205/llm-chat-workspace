<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Chat Workspace</title>
    <style>
      :root {
        --bg: #f6f8fb;
        --panel: #ffffff;
        --border: #d9e1ea;
        --text: #1f2a37;
        --muted: #5f6b7a;
        --primary: #2f6feb;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: Inter, Arial, sans-serif;
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }
      .container { max-width: 1240px; margin: 0 auto; padding: 1rem; }
      h1 {
        margin: 0;
        font-size: 1.35rem;
      }
      .app-shell {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 1rem;
        min-height: calc(100vh - 2rem);
      }
      .sidebar {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
        padding: 0.85rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .thread-list { display: flex; flex-direction: column; gap: 0.4rem; max-height: 70vh; overflow: auto; }
      .thread-item {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        padding: 0.55rem 0.65rem;
        cursor: pointer;
        font-size: 0.92rem;
      }
      .thread-item:hover { background: #f8fbff; }
      .thread-item.active { border-color: var(--primary); }
      .main-area {
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 0.75rem;
      }
      .topbar {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
        padding: 0.75rem 0.9rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .workspace {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }
      .chat-pane {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 520px;
      }
      .pane-header {
        padding: 0.65rem 0.8rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .messages {
        overflow: auto;
        padding: 0.9rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .msg {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.55rem 0.65rem;
        max-width: 92%;
      }
      .msg.user { align-self: flex-end; background: #eef4ff; }
      .msg.assistant { align-self: flex-start; background: #fff; }
      .msg-meta { display: flex; gap: 0.5rem; margin-top: 0.35rem; font-size: 0.78rem; color: var(--muted); }
      .composer {
        border-top: 1px solid var(--border);
        padding: 0.7rem;
        display: grid;
        gap: 0.45rem;
      }
      .composer-row { display: flex; gap: 0.5rem; }
      input, select {
        flex: 1;
        padding: 0.6rem 0.7rem;
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      button {
        padding: 0.55rem 0.9rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
      }
      .ask-btn {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }
      .muted {
        color: var(--muted);
      }
      .inline-actions { display: flex; gap: 0.3rem; }
      @media (min-width: 900px) {
        .workspace {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (max-width: 980px) {
        .app-shell { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="app-shell">
        <aside class="sidebar">
          <h1>Conversations</h1>
          <button id="new-thread-btn" type="button">+ New Conversation</button>
          <div id="thread-status" class="muted"></div>
          <div id="thread-list" class="thread-list"></div>
        </aside>
        <section class="main-area">
          <header class="topbar">
            <strong>Local Chat Workspace</strong>
            <span id="workspace-status" class="muted">2 windows available</span>
          </header>
          <section id="workspace" class="workspace"></section>
        </section>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
  </html>
